<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Подтверждение входа в EventAI</title>
        <script src="https://st.max.ru/js/max-web-app.js"></script>
        <link rel="stylesheet" href="../static/css/miniapp.css" />
    </head>
    <body>
        <main class="shell">
            <section class="card">
                <!-- <div class="badge">EventAI</div> -->
                <h1>Подтверждение входа в EventAI</h1>

                <div class="art" aria-hidden="true">
                    <img
                        id="heroImage"
                        src="{{ cat_image_src }}"
                        alt="Котик EventAI"
                    />
                </div>

                <p class="subtle">
                    Остался один маленький шаг и мы впустим вас в приложение.
                </p>

                <button id="completeButton" class="button" type="button">
                    Авторизоваться через MAX
                </button>

                <div id="successBox" class="notice success">
                    Авторизация успешна. Возвращайтесь в EventAI, чтобы
                    продолжить вход.
                </div>

                <div id="errorBox" class="notice error"></div>
            </section>
        </main>

        <script>
            const webApp =
                window.WebApp && typeof window.WebApp === "object"
                    ? window.WebApp
                    : null;
            if (webApp && typeof webApp.ready === "function") {
                webApp.ready();
            }

            const completeButton = document.getElementById("completeButton");
            const successBox = document.getElementById("successBox");
            const errorBox = document.getElementById("errorBox");

            const completeAuthURL = "/api/v1/auth/max/complete";
            const initData =
                webApp && typeof webApp.initData === "string"
                    ? webApp.initData
                    : "";
            const sessionId =
                webApp &&
                webApp.initDataUnsafe &&
                typeof webApp.initDataUnsafe.start_param === "string"
                    ? webApp.initDataUnsafe.start_param
                    : "";

            function showSuccess(message) {
                successBox.textContent = message;
                successBox.classList.add("visible");
                errorBox.classList.remove("visible");
            }

            function showError(message) {
                errorBox.textContent = message;
                errorBox.classList.add("visible");
                successBox.classList.remove("visible");
            }

            function errorMessageFromBackend(message) {
                switch (message) {
                    case "invalid input":
                        return "Сессия входа передана некорректно. Попробуйте еще раз.";
                    case "max init data expired":
                        return "Сессия входа устарела. Вернитесь в EventAI и начните вход заново.";
                    case "max start param mismatch":
                        return "Не удалось связать вход с приложением. Попробуйте еще раз.";
                    case "unauthorized":
                        return "MAX не подтвердил авторизацию. Попробуйте войти еще раз.";
                    case "not found":
                        return "Сессия не найдена. Попробуйте еще раз.";
                    case "auth session expired":
                        return "Сессия входа уже истекла. Попробуйте еще раз.";
                    case "auth session already completed":
                        return "Этот вход уже был подтвержден. Вернитесь в EventAI и попробуйте еще раз.";
                    case "auth session already exchanged":
                        return "Вход уже завершен. Вернитесь в EventAI.";
                    case "auth session not ready":
                        return "Сессия входа еще не готова. Попробуйте еще раз.";
                    case "conflict":
                        return "Не удалось завершить вход. Попробуйте еще раз.";
                    default:
                        return "Не удалось завершить вход. Попробуйте еще раз.";
                }
            }

            if (!initData || !sessionId) {
                completeButton.disabled = true;
                showError("Сессия не найдена. Попробуйте еще раз.");
            }

            completeButton.addEventListener("click", async () => {
                if (!initData || !sessionId) {
                    showError("Сессия не найдена. Попробуйте еще раз.");
                    return;
                }

                completeButton.disabled = true;
                errorBox.classList.remove("visible");
                successBox.classList.remove("visible");

                try {
                    const response = await fetch(completeAuthURL, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            init_data: initData,
                        }),
                    });

                    let payload = null;
                    try {
                        payload = await response.json();
                    } catch (_error) {
                        payload = null;
                    }

                    if (!response.ok) {
                        const backendMessage =
                            payload &&
                            payload.error &&
                            typeof payload.error.message === "string"
                                ? payload.error.message
                                : "";
                        showError(errorMessageFromBackend(backendMessage));
                        completeButton.disabled = false;
                        return;
                    }

                    showSuccess(
                        "Авторизация успешна. Возвращайтесь в EventAI, чтобы продолжить вход.",
                    );
                } catch (_error) {
                    showError("Не удалось завершить вход. Попробуйте еще раз.");
                    completeButton.disabled = false;
                }
            });
        </script>
    </body>
</html>
