<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Подтверждение входа в EventAI</title>
        <script src="https://st.max.ru/js/max-web-app.js"></script>
        <style>
            :root {
                color-scheme: light;
                --bg: #eef6ff;
                --bg-deep: #ddeeff;
                --panel: rgba(255, 255, 255, 0.9);
                --ink: #13253a;
                --muted: #61758d;
                --line: rgba(19, 37, 58, 0.08);
                --accent: #2f80ff;
                --accent-deep: #195fd8;
                --accent-soft: rgba(47, 128, 255, 0.14);
                --success: #16794d;
                --success-soft: rgba(22, 121, 77, 0.12);
                --error: #c62828;
                --error-soft: rgba(198, 40, 40, 0.12);
                --shadow: 0 28px 72px rgba(34, 92, 163, 0.16);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                min-height: 100%;
            }

            body {
                margin: 0;
                font-family: "Manrope", "Segoe UI", sans-serif;
                color: var(--ink);
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(143, 199, 255, 0.32),
                        transparent 30%
                    ),
                    radial-gradient(
                        circle at bottom right,
                        rgba(47, 128, 255, 0.14),
                        transparent 24%
                    ),
                    linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            }

            .shell {
                max-width: 760px;
                margin: 0 auto;
                padding: 22px 16px 34px;
            }

            .card {
                position: relative;
                border: 1px solid var(--line);
                border-radius: 34px;
                background: var(--panel);
                backdrop-filter: blur(18px);
                box-shadow: var(--shadow);
                padding: 72px 22px 30px;
                text-align: center;
            }

            .badge {
                position: absolute;
                top: 18px;
                right: 18px;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.78);
                border: 1px solid rgba(19, 37, 58, 0.06);
                font-size: 13px;
                color: var(--muted);
            }

            .badge::before {
                content: "";
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 0 5px rgba(47, 128, 255, 0.12);
                position: relative;
                z-index: 1;
            }

            .badge::after {
                content: "";
                position: absolute;
                left: 16px;
                top: 50%;
                width: 26px;
                height: 26px;
                border-radius: 999px;
                border: 2px solid rgba(47, 128, 255, 0.32);
                transform: translate(-50%, -50%) scale(0.3);
                animation: badge-pulse 2s ease-out infinite;
            }

            @keyframes badge-pulse {
                0% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.3);
                }

                20% {
                    opacity: 0.9;
                }

                100% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(1);
                }
            }

            h1 {
                margin: 20px 0 0;
                font-family: "Cormorant Garamond", "Georgia", serif;
                font-size: clamp(40px, 8vw, 76px);
                line-height: 0.95;
                letter-spacing: -0.035em;
                font-weight: 600;
            }

            .art {
                display: block;
                justify-content: center;
                margin: 22px 0 10px;
            }

            .art img {
                width: min(100%, 300px);
                height: auto;
                border-radius: 24px;
            }

            .subtle {
                margin: 5px 0 15px;
                font-size: 16px;
                line-height: 1.55;
                color: var(--muted);
            }

            .button {
                appearance: none;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 58px;
                padding: 0 26px;
                border: 0;
                border-radius: 999px;
                font: inherit;
                font-size: 16px;
                font-weight: 800;
                letter-spacing: 0.01em;
                cursor: pointer;
                color: #fff;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent-deep)
                );
                box-shadow: 0 18px 38px rgba(25, 95, 216, 0.22);
                transition:
                    transform 140ms ease,
                    opacity 140ms ease,
                    box-shadow 140ms ease;
            }

            .button:hover {
                transform: translateY(-1px);
            }

            .button:disabled {
                cursor: not-allowed;
                opacity: 0.58;
                transform: none;
                box-shadow: none;
            }

            .notice {
                display: none;
                max-width: 560px;
                margin: 18px auto 0;
                padding: 15px 16px;
                border-radius: 18px;
                font-size: 15px;
                line-height: 1.58;
                text-align: left;
            }

            .notice.visible {
                display: block;
            }

            .notice.success {
                background: var(--success-soft);
                border: 1px solid rgba(22, 121, 77, 0.16);
                color: var(--success);
            }

            .notice.error {
                background: var(--error-soft);
                border: 1px solid rgba(198, 40, 40, 0.16);
                color: var(--error);
            }

            @media (max-width: 640px) {
                .card {
                    padding: 24px 18px 26px;
                }
            }
        </style>
    </head>
    <body>
        <main class="shell">
            <section class="card">
                <div class="badge">EventAI</div>
                <h1>Подтверждение входа в EventAI</h1>

                <div class="art" aria-hidden="true">
                    <img
                        id="heroImage"
                        src="{{ cat_image_src }}"
                        alt="Котик EventAI"
                    />
                </div>

                <p class="subtle">
                    Остался один маленький шаг и мы впустим вас в приложение.
                </p>

                <button id="completeButton" class="button" type="button">
                    Авторизоваться через MAX
                </button>

                <div id="successBox" class="notice success">
                    Авторизация успешна. Возвращайтесь в EventAI, чтобы
                    продолжить вход.
                </div>

                <div id="errorBox" class="notice error"></div>
            </section>
        </main>

        <script>
            const webApp =
                window.WebApp && typeof window.WebApp === "object"
                    ? window.WebApp
                    : null;
            if (webApp && typeof webApp.ready === "function") {
                webApp.ready();
            }

            const completeButton = document.getElementById("completeButton");
            const successBox = document.getElementById("successBox");
            const errorBox = document.getElementById("errorBox");

            const completeAuthURL = "/api/v1/auth/max/complete";
            const initData =
                webApp && typeof webApp.initData === "string"
                    ? webApp.initData
                    : "";
            const sessionId =
                webApp &&
                webApp.initDataUnsafe &&
                typeof webApp.initDataUnsafe.start_param === "string"
                    ? webApp.initDataUnsafe.start_param
                    : "";

            function showSuccess(message) {
                successBox.textContent = message;
                successBox.classList.add("visible");
                errorBox.classList.remove("visible");
            }

            function showError(message) {
                errorBox.textContent = message;
                errorBox.classList.add("visible");
                successBox.classList.remove("visible");
            }

            function errorMessageFromBackend(message) {
                switch (message) {
                    case "invalid input":
                        return "Сессия входа передана некорректно. Попробуйте еще раз.";
                    case "max init data expired":
                        return "Сессия входа устарела. Вернитесь в EventAI и начните вход заново.";
                    case "max start param mismatch":
                        return "Не удалось связать вход с приложением. Попробуйте еще раз.";
                    case "unauthorized":
                        return "MAX не подтвердил авторизацию. Попробуйте войти еще раз.";
                    case "not found":
                        return "Сессия не найдена. Попробуйте еще раз.";
                    case "auth session expired":
                        return "Сессия входа уже истекла. Попробуйте еще раз.";
                    case "auth session already completed":
                        return "Этот вход уже был подтвержден. Вернитесь в EventAI и попробуйте еще раз.";
                    case "auth session already exchanged":
                        return "Вход уже завершен. Вернитесь в EventAI.";
                    case "auth session not ready":
                        return "Сессия входа еще не готова. Попробуйте еще раз.";
                    case "conflict":
                        return "Не удалось завершить вход. Попробуйте еще раз.";
                    default:
                        return "Не удалось завершить вход. Попробуйте еще раз.";
                }
            }

            if (!initData || !sessionId) {
                completeButton.disabled = true;
                showError("Сессия не найдена. Попробуйте еще раз.");
            }

            completeButton.addEventListener("click", async () => {
                if (!initData || !sessionId) {
                    showError("Сессия не найдена. Попробуйте еще раз.");
                    return;
                }

                completeButton.disabled = true;
                errorBox.classList.remove("visible");
                successBox.classList.remove("visible");

                try {
                    const response = await fetch(completeAuthURL, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            init_data: initData,
                        }),
                    });

                    let payload = null;
                    try {
                        payload = await response.json();
                    } catch (_error) {
                        payload = null;
                    }

                    if (!response.ok) {
                        const backendMessage =
                            payload &&
                            payload.error &&
                            typeof payload.error.message === "string"
                                ? payload.error.message
                                : "";
                        showError(errorMessageFromBackend(backendMessage));
                        completeButton.disabled = false;
                        return;
                    }

                    showSuccess(
                        "Авторизация успешна. Возвращайтесь в EventAI, чтобы продолжить вход.",
                    );
                } catch (_error) {
                    showError("Не удалось завершить вход. Попробуйте еще раз.");
                    completeButton.disabled = false;
                }
            });
        </script>
    </body>
</html>
